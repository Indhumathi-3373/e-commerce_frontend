<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GT Sports | Order Confirmation</title>
  <link rel="stylesheet" href="./confirmation.css">
</head>
<body>
  <main class="confirm-page">
    <section class="confirm-card">
      <p class="badge">Order Confirmed</p>
      <h1>Thank you for your order</h1>
      <p class="sub">Your jersey order has been received and is being prepared.</p>

      <div class="summary">
        <div class="row"><span>Order ID</span><strong id="orderId">-</strong></div>
        <div class="row"><span>Customer</span><strong id="customerName">-</strong></div>
        <div class="row"><span>Quantity</span><strong id="orderQty">-</strong></div>
        <div class="row"><span>Total</span><strong id="orderTotal">-</strong></div>
        <div class="row"><span>Placed On</span><strong id="placedOn">-</strong></div>
        <div class="row eta"><span>Estimated Delivery</span><strong id="etaDate">-</strong></div>
      </div>

      <p class="note">Delivery timelines are estimates and may vary by location.</p>

      <div class="actions">
        <a href="home.html">Back to Home</a>
        <a class="secondary" href="contact.html">Contact Support</a>
      </div>
    </section>
  </main>

  <script src="confirmation.js"></script>
</body>
</html>
