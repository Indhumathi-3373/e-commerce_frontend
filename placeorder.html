<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GT Sports | Place Order</title>
  <link rel="stylesheet" href="./placeorder.css">
</head>
<body>
  <main class="page">
    <form id="order" novalidate>
      <h1>GT SUBLIMATION</h1>
      <p class="sub">Place your order</p>

      <section class="prod">
        <img src="image/shop1.jpg" alt="Classic T-Shirt">
        <div>
          <strong>Classic Team Jersey</strong>
          <p>Base price: Rs. 799</p>

          <label for="qty">Quantity</label>
          <input type="number" id="qty" value="1" min="1">

          <label for="size">Size</label>
          <select id="size" required>
            <option value="">Select size</option>
            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>
          </select>
        </div>
      </section>

      <div class="total" id="totalPrice">Total: Rs. 799</div>

      <label for="name">Full Name</label>
      <input id="name" required>

      <label for="addr">Shipping Address</label>
      <textarea id="addr" rows="3" required></textarea>

      <label for="pay">Payment Method</label>
      <select id="pay" required>
        <option value="">Select payment method</option>
        <option value="cod">Cash on Delivery</option>
        <option value="card">Card</option>
        <option value="upi">UPI</option>
      </select>

      <button id="btn" type="submit">Place Order</button>
      <p id="status" aria-live="polite"></p>
    </form>
  </main>

  <script src="auth-session.js"></script>
  <script src="placeorder.js"></script>
</body>
</html>
