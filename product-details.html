<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GT Sports | Product Details</title>
  <link rel="stylesheet" href="./product-details.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="home.html">GT SPORTS</a>
    <a class="back-link" href="home.html">Back to Home</a>
  </header>

  <main class="details-page">
    <article class="details-card">
      <img id="productImage" src="image/shop1.jpg" alt="Product image">
      <div class="details-content">
        <p class="tag">Product Details</p>
        <h1 id="productName">Jersey</h1>
        <p id="productAbout">Product description</p>
        <p class="price">Rs. <span id="productPrice">0</span></p>
        <div class="actions">
          <a class="btn primary" href="login.html">Login to Buy</a>
          <a class="btn" href="placeorder.html">Go to Order</a>
        </div>
      </div>
    </article>
  </main>

  <script src="product-details.js"></script>
</body>
</html>
